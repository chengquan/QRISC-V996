# OpenOCD 配置:经 remote_bitbang 连 QRISC-V996 仿真里的 JTAG 调试模块(SBA)。
#
# ⚠️ 本平台的 biRISC-V 核【没有调试模式】(无 halt/单步/读 CPU 寄存器)。
# 所以 OpenOCD 标准的 `mdw/mww` 用不了 —— 它们要求先 examine 一个可调试的核,
# 而我们的核 examine 不过,会报 "Target not examined yet"。
#
# 我们只有【System Bus Access(SBA)】:经 DMI 直接读写系统总线(内存+外设),不碰核。
# 用底层 `riscv dmi_read/dmi_write` 驱动 SBA 寄存器,封装成 sba_read / sba_write:
#
#   sba_read  0x80000000          # 读内存/外设(返回 0x........)
#   sba_write 0x94000008 0xCAFE0000  # 写内存/外设
#
# 用法:
#   1) 起仿真(带 JTAG): JTAG=9999 ./tb/tb_soc/run.sh
#   2) 起 OpenOCD:        openocd -f tools/openocd/qrisc-v996.cfg
#   3) telnet localhost 4444,敲 sba_read / sba_write

adapter driver remote_bitbang
remote_bitbang host localhost
remote_bitbang port 9999

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0xDEB10001
target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu

adapter speed 1000

# init 会尝试 examine 核并失败(核无调试模式)——这是预期的,用 catch 吞掉,
# 不影响后面的底层 DMI 访问(SBA 不需要 examine)。
catch { init }

# DM 寄存器地址(RISC-V Debug 0.13)
set SBCS      0x38
set SBADDRESS 0x39
set SBDATA    0x3c

# ---- SBA 读:sbcs(readonaddr+32位) -> 写地址触发读 -> 读 sbdata ----
proc sba_read {addr} {
    global SBCS SBADDRESS SBDATA
    riscv dmi_write $SBCS      0x00140000
    riscv dmi_write $SBADDRESS $addr
    set v [riscv dmi_read $SBDATA]
    echo [format "  \[SBA\] read  0x%08x = 0x%08x" $addr $v]
    return $v
}

# ---- SBA 写:sbcs(32位) -> 写地址 -> 写 sbdata(触发总线写)----
proc sba_write {addr val} {
    global SBCS SBADDRESS SBDATA
    riscv dmi_write $SBCS      0x00040000
    riscv dmi_write $SBADDRESS $addr
    riscv dmi_write $SBDATA    $val
    echo [format "  \[SBA\] write 0x%08x = 0x%08x" $addr $val]
}

echo "QRISC-V996 SBA 调试就绪。telnet localhost 4444 后:"
echo "  sba_read  0x80000000            # 读 DRAM 头(镜像首字)"
echo "  sba_write 0x94000008 0xCAFE0000 # 写 GPIO 输出"
echo "  sba_read  0x92000008            # 读 UART 状态"
echo "(标准 mdw/mww 用不了:核无调试模式,examine 不过 —— 这是预期的。)"
