# OpenOCD 配置:经 remote_bitbang 连 QRISC-V996 仿真里的 JTAG 调试模块。
#
# 本平台的 biRISC-V 核现在支持【调试模式】:
#   • halt / resume          —— 暂停/恢复 CPU
#   • 单步(single-step)     —— dcsr.step
#   • 读写 GPR / CSR          —— 抽象命令 access-register
#   • 软件断点(ebreak)      —— dcsr.ebreakm,ebreak 命中即进调试
#   • System Bus Access(SBA)—— 经 DMI 直接读写系统总线(内存+外设),不暂停核
#
# DM 是【精简实现】(RISC-V Debug Spec 0.13 的子集:无 progbuf / 硬件触发 /
# abstractauto)。OpenOCD 的标准 riscv 驱动 examine 会探测一大堆能力,可能对
# 缺失项报 warning;若 examine 不通过,仍可用下方底层 `riscv dmi_*` 封装的过程
# (halt/resume/step/读寄存器/断点),这些与 RTL 自测(+DBGTEST)走的是同一条路。
#
# 用法:
#   1) 起仿真(带 JTAG):  JTAG=9999 ./tb/tb_soc/run.sh
#   2) 起 OpenOCD:         openocd -f tools/openocd/qrisc-v996.cfg
#   3) telnet localhost 4444,敲下面的 dbg_* / sba_* 过程
#   4) (可选)GDB:        riscv32-unknown-elf-gdb,target remote :3333

adapter driver remote_bitbang
remote_bitbang host localhost
remote_bitbang port 9999

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0xDEB10001
target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu

adapter speed 1000

# examine 可能因 DM 精简而不完全通过 —— 用 catch 吞掉,不影响底层 DMI 访问。
catch { init }

#--------------------------------------------------------------------
# DM 寄存器地址(RISC-V Debug Spec 0.13)
#--------------------------------------------------------------------
set DMCONTROL  0x10
set DMSTATUS   0x11
set DATA0      0x04
set ABSTRACTCS 0x16
set COMMAND    0x17
set SBCS       0x38
set SBADDRESS  0x39
set SBDATA     0x3c

# 抽象命令 access-register 的 regno
set REG_X(0)   0x1000   ;# x0..x31 = 0x1000+n
set CSR_MISA   0x0301
set CSR_DCSR   0x07b0
set CSR_DPC    0x07b1

#--------------------------------------------------------------------
# halt / resume / 单步
#--------------------------------------------------------------------
# haltreq(bit31)+ dmactive(bit0)
proc dbg_halt {} {
    global DMCONTROL DMSTATUS
    riscv dmi_write $DMCONTROL 0x80000001
    set s [riscv dmi_read $DMSTATUS]
    echo [format "  \[DBG\] halted  dmstatus=0x%08x (allhalted bit9=%d)" $s [expr {($s>>9)&1}]]
    return $s
}
# resumereq(bit30)+ dmactive
proc dbg_resume {} {
    global DMCONTROL
    riscv dmi_write $DMCONTROL 0x40000001
    echo "  \[DBG\] resume"
}
# 单步:置 dcsr.step,resume 放一条,核自动重新 halt;完事清 step
proc dbg_step {} {
    global CSR_DCSR
    dbg_csr_write $CSR_DCSR 0x00000004   ;# dcsr.step=1
    dbg_resume
    after 50
    dbg_csr_write $CSR_DCSR 0x00000000   ;# 清 step
    set pc [dbg_csr_read 0x07b1]
    echo [format "  \[DBG\] step -> dpc=0x%08x" $pc]
}

#--------------------------------------------------------------------
# 读写 GPR / CSR(抽象命令 access-register;需先 halt)
#--------------------------------------------------------------------
# command = {cmdtype=0, transfer=1, write, regno}
proc dbg_reg_read {regno} {
    global DATA0 COMMAND
    # transfer(bit17)=1, write(bit16)=0
    riscv dmi_write $COMMAND [expr {0x00020000 | ($regno & 0xffff)}]
    set v [riscv dmi_read $DATA0]
    return $v
}
proc dbg_reg_write {regno val} {
    global DATA0 COMMAND
    riscv dmi_write $DATA0 $val
    # transfer(bit17)=1, write(bit16)=1
    riscv dmi_write $COMMAND [expr {0x00030000 | ($regno & 0xffff)}]
}
# GPR x0..x31
proc dbg_gpr_read  {n}     { return [dbg_reg_read  [expr {0x1000 + $n}]] }
proc dbg_gpr_write {n val} {        dbg_reg_write [expr {0x1000 + $n}] $val }
# CSR(misa/dpc/dcsr 等)
proc dbg_csr_read  {csr}     { return [dbg_reg_read  $csr] }
proc dbg_csr_write {csr val} {        dbg_reg_write $csr $val }

# 读全部 GPR(调试常用)
proc dbg_regs {} {
    for {set i 0} {$i < 32} {incr i} {
        echo [format "  x%-2d = 0x%08x" $i [dbg_gpr_read $i]]
    }
    echo [format "  pc  = 0x%08x" [dbg_csr_read 0x07b1]]
}

#--------------------------------------------------------------------
# 软件断点(ebreak):置 dcsr.ebreakm,把 ebreak(0x00100073)写到目标地址。
# 核执行到该处即进调试(自动 halt),dpc = 该 ebreak 的 PC。
#--------------------------------------------------------------------
proc dbg_bp_enable {} {
    global CSR_DCSR
    dbg_csr_write $CSR_DCSR 0x00008000   ;# dcsr.ebreakm=1
    echo "  \[DBG\] ebreakm=1(ebreak 进调试)"
}
proc dbg_bp_set {addr} {
    sba_write $addr 0x00100073           ;# 该地址写 ebreak
    echo [format "  \[DBG\] 软件断点 @0x%08x(原指令请自行保存以便恢复)" $addr]
}

#--------------------------------------------------------------------
# System Bus Access(读写内存/外设,不暂停核)
#--------------------------------------------------------------------
proc sba_read {addr} {
    global SBCS SBADDRESS SBDATA
    riscv dmi_write $SBCS      0x00140000   ;# 32位 + readonaddr
    riscv dmi_write $SBADDRESS $addr
    set v [riscv dmi_read $SBDATA]
    echo [format "  \[SBA\] read  0x%08x = 0x%08x" $addr $v]
    return $v
}
proc sba_write {addr val} {
    global SBCS SBADDRESS SBDATA
    riscv dmi_write $SBCS      0x00040000   ;# 32位,不自增
    riscv dmi_write $SBADDRESS $addr
    riscv dmi_write $SBDATA    $val
    echo [format "  \[SBA\] write 0x%08x = 0x%08x" $addr $val]
}

echo "QRISC-V996 全功能调试就绪。telnet localhost 4444 后:"
echo "  dbg_halt                         # 暂停 CPU"
echo "  dbg_regs                         # 看 GPR + pc(dpc)"
echo "  dbg_gpr_write 10 0x1234abcd      # 写 x10"
echo "  dbg_step                         # 单步一条"
echo "  dbg_bp_enable; dbg_bp_set 0x...  # 设软件断点(ebreak)"
echo "  dbg_resume                       # 恢复运行"
echo "  sba_read/sba_write               # 读写内存/外设(不暂停核)"
